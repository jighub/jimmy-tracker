<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>Jimmy</title>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Jimmy">
<meta name="theme-color" content="#0f1117">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--surface:#1a1d27;--surface2:#232734;--surface3:#2c3040;
  --accent:#6c63ff;--accent2:#4ecdc4;--accent3:#ff6b6b;--accent4:#ffd93d;
  --text:#e8e8ef;--text2:#9a9ab0;--text3:#6b6b80;
  --green:#22c55e;--green-bg:rgba(34,197,94,.12);
  --border:#2e3245;--radius:12px;
  --glow-accent:rgba(108,99,255,.25);--glow-green:rgba(34,197,94,.2);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);line-height:1.5;min-height:100vh;-webkit-user-select:none;padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom)}
.app{max-width:900px;margin:0 auto;padding:16px}

/* View toggle */
.view-toggle{display:flex;background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;margin-bottom:20px}
.view-btn{flex:1;padding:10px;text-align:center;font-size:.85rem;font-weight:600;cursor:pointer;transition:.2s;border:none;background:transparent;color:var(--text2)}
.view-btn.active{background:var(--accent);color:#fff}
.view-btn:not(.active):hover{background:var(--surface2)}

/* Header */
.header{text-align:center;padding:32px 0 24px;position:relative}
.header h1{font-size:1.8rem;font-weight:800;display:inline-flex;align-items:center;gap:10px;background:linear-gradient(135deg,var(--accent),var(--accent2),var(--accent3),var(--accent));background-size:300% 300%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:headerGlow 6s ease infinite}
.header-icon{flex-shrink:0}
@keyframes headerGlow{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
.header::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:200px;height:2px;background:linear-gradient(90deg,transparent,var(--accent),var(--accent2),transparent);border-radius:1px}
.header p{color:var(--text2);font-size:.85rem;margin-top:8px}

/* Stats bar */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:20px}
.stat{background:var(--surface);border-radius:var(--radius);padding:14px 10px;text-align:center;border:1px solid var(--border);transition:.2s}
.stat:hover{border-color:var(--accent);box-shadow:0 0 20px var(--glow-accent)}
.stat-val{font-size:1.3rem;font-weight:700;color:var(--accent2)}
.stat-label{font-size:.7rem;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}

/* Week nav */
.week-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;background:var(--surface);border-radius:var(--radius);padding:10px 16px;border:1px solid var(--border)}
.week-nav button{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:6px 14px;border-radius:8px;cursor:pointer;font-size:.85rem;transition:.15s}
.week-nav button:hover{background:var(--accent);border-color:var(--accent)}
.week-nav button:disabled{opacity:.3;cursor:default}
.week-label{font-weight:600;font-size:.95rem}
.week-dates{color:var(--text2);font-size:.78rem}

/* Day tabs */
.day-tabs{display:flex;gap:4px;margin-bottom:16px;overflow-x:auto;padding-bottom:4px}
.day-tab{flex:1;min-width:0;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 6px;text-align:center;cursor:pointer;transition:.2s;position:relative}
.day-tab:hover{border-color:var(--accent);box-shadow:0 0 12px var(--glow-accent)}
.day-tab.active{border-color:var(--accent);background:var(--surface2);box-shadow:0 0 16px var(--glow-accent)}
.day-tab.completed{border-color:var(--green);box-shadow:0 0 12px var(--glow-green)}
.day-tab .day-name{font-size:.7rem;color:var(--text2);text-transform:uppercase;letter-spacing:.5px}
.day-tab .day-date{font-size:.6rem;color:var(--accent2);font-weight:600;margin-top:1px}
.day-tab .day-type{font-size:.65rem;color:var(--text3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.day-tab .day-check{position:absolute;top:4px;right:6px;font-size:.65rem;color:var(--green)}
.day-tab.rest{opacity:.5}

/* Workout card */
.workout{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;margin-bottom:16px;transition:.2s}
.workout:hover{border-color:rgba(108,99,255,.3);box-shadow:0 4px 24px rgba(0,0,0,.3),0 0 20px var(--glow-accent)}
.workout-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.workout-title{font-size:1.05rem;font-weight:600}
.workout-subtitle{color:var(--text2);font-size:.78rem;margin-top:2px}
.workout-badge{font-size:.7rem;padding:4px 10px;border-radius:20px;font-weight:600;box-shadow:0 0 8px rgba(0,0,0,.2)}
.badge-push{background:rgba(108,99,255,.2);color:var(--accent);border:1px solid rgba(108,99,255,.3)}
.badge-pull{background:rgba(78,205,196,.2);color:var(--accent2);border:1px solid rgba(78,205,196,.3)}
.badge-legs{background:rgba(255,217,61,.2);color:var(--accent4);border:1px solid rgba(255,217,61,.3)}
.badge-cardio{background:rgba(255,107,107,.2);color:var(--accent3);border:1px solid rgba(255,107,107,.3)}
.badge-hicard{background:rgba(255,165,0,.2);color:#ffa500;border:1px solid rgba(255,165,0,.3)}
.badge-rest{background:var(--surface2);color:var(--text3);border:1px solid var(--border)}

/* Progress bar inside workout */
.workout-progress{height:3px;background:var(--surface3);margin:0}
.workout-progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:0 3px 3px 0;transition:width .3s ease}

/* Cardio banner */
.cardio-banner{padding:10px 20px;text-align:center;font-size:.8rem;font-weight:700;letter-spacing:.5px}
.cardio-banner.zone2{background:rgba(78,205,196,.1);color:var(--accent2);border-bottom:1px solid rgba(78,205,196,.2)}
.cardio-banner.hiit{background:rgba(255,107,107,.1);color:var(--accent3);border-bottom:1px solid rgba(255,107,107,.2)}
.cardio-banner.zone45{background:rgba(255,165,0,.1);color:#ffa500;border-bottom:1px solid rgba(255,165,0,.2)}

/* Exercise rows */
.exercise-group{padding:4px 0}
.superset-row{display:flex;align-items:center;padding:10px 20px 4px;gap:8px}
.superset-label{font-size:.68rem;color:var(--accent);text-transform:uppercase;letter-spacing:1px;font-weight:700;white-space:nowrap}
.superset-line{flex:1;height:1px;background:var(--border)}
.timer-row{padding:4px 20px 8px 54px}
.timer-btn{background:var(--surface3);border:1px solid var(--border);color:var(--accent2);border-radius:6px;padding:4px 12px;font-size:.68rem;cursor:pointer;transition:.15s;white-space:nowrap;display:inline-flex;align-items:center;gap:4px}
.timer-btn:hover{background:var(--accent2);color:#fff;border-color:var(--accent2)}
.timer-btn.running{background:var(--accent3);border-color:var(--accent3);color:#fff;animation:timerPulse 1s ease infinite}
@keyframes timerPulse{0%,100%{opacity:1}50%{opacity:.7}}
.exercise-row{display:flex;align-items:flex-start;padding:8px 20px;gap:12px;transition:.15s}
.exercise-row:hover{background:var(--surface2)}
.ex-check{width:22px;height:22px;border:2px solid var(--border);border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;transition:.2s}
.ex-check:hover{border-color:var(--accent);box-shadow:0 0 8px var(--glow-accent)}
.ex-check.checked{background:var(--green);border-color:var(--green);box-shadow:0 0 10px var(--glow-green)}
.ex-check.checked::after{content:'\2713';color:#fff;font-size:.75rem;font-weight:700}
.ex-info{flex:1;min-width:0}
.ex-name{font-size:.88rem;font-weight:500}
.ex-detail{font-size:.72rem;color:var(--text2);margin-top:1px}
.ex-note{font-size:.68rem;color:var(--text3);font-style:italic;margin-top:2px}
.ex-rest{font-size:.65rem;color:var(--accent4);margin-top:2px}
.ex-sets{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px}
.set-input{width:52px;background:var(--surface3);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:4px 6px;font-size:.72rem;text-align:center;outline:none;transition:border-color .15s, box-shadow .15s}
.set-input:focus{border-color:var(--accent);box-shadow:0 0 8px var(--glow-accent)}
.set-input.saved{border-color:var(--green)!important;box-shadow:0 0 8px var(--glow-green)!important}
.set-input::placeholder{color:var(--text3)}
.set-group{display:flex;flex-direction:column;align-items:center;gap:2px}
.set-label{font-size:.58rem;color:var(--text3)}
.set-pair{display:flex;gap:2px}

/* Cardio specific */
.cardio-log{padding:16px 20px}
.cardio-row{display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap}
.cardio-field{display:flex;flex-direction:column;gap:4px}
.cardio-field label{font-size:.7rem;color:var(--text2)}
.cardio-field input,.cardio-field select{background:var(--surface3);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:8px 10px;font-size:.82rem;outline:none;width:130px;transition:.15s}
.cardio-field input:focus,.cardio-field select:focus{border-color:var(--accent);box-shadow:0 0 8px var(--glow-accent)}
.cardio-notes{margin-top:12px}
.cardio-notes textarea{width:100%;background:var(--surface3);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:8px 10px;font-size:.82rem;outline:none;resize:vertical;min-height:50px;font-family:inherit;transition:.15s}
.cardio-notes textarea:focus{border-color:var(--accent)}
.cardio-steps{padding:12px 16px;background:var(--surface2);border-radius:10px;border:1px solid var(--border)}
.cardio-steps ol{padding-left:20px;margin:0}
.cardio-steps li{font-size:.78rem;color:var(--text2);margin-bottom:6px;line-height:1.5}
.cardio-steps li:last-child{margin-bottom:0}
.cardio-steps .step-title{font-size:.72rem;font-weight:600;color:var(--accent2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}

/* Rest day */
.rest-content{padding:40px 20px;text-align:center;color:var(--text2)}
.rest-content .icon{font-size:2rem;margin-bottom:8px}
.rest-content p{font-size:.85rem}

/* Complete button */
.complete-btn{display:block;width:100%;padding:14px;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:10px;font-size:.9rem;font-weight:600;cursor:pointer;transition:.2s;margin-top:4px}
.complete-btn:hover{background:var(--accent);border-color:var(--accent);box-shadow:0 0 16px var(--glow-accent)}
.complete-btn.done{background:var(--green-bg);border-color:var(--green);color:var(--green);box-shadow:0 0 16px var(--glow-green)}
.complete-btn.attention{animation:btnPulse 1.5s ease infinite;border-color:var(--accent2);box-shadow:0 0 20px rgba(78,205,196,.3)}
@keyframes btnPulse{0%,100%{box-shadow:0 0 10px rgba(78,205,196,.2)}50%{box-shadow:0 0 25px rgba(78,205,196,.4)}}

/* Progress section */
.progress-section{margin-top:24px;margin-bottom:40px}
.progress-section h2{font-size:1rem;font-weight:600;margin-bottom:12px}
.progress-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.progress-day-headers{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px}
.progress-day-header{text-align:center;font-size:.65rem;color:var(--text2);font-weight:600}
.progress-cell{aspect-ratio:1;border-radius:6px;background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:.55rem;color:var(--text3);position:relative;cursor:pointer;transition:.15s}
.progress-cell:hover{border-color:var(--accent);transform:scale(1.1)}
.progress-cell.full{background:var(--green-bg);border-color:var(--green);color:var(--green)}
.progress-cell.partial{background:rgba(255,217,61,.1);border-color:var(--accent4);color:var(--accent4)}
.progress-cell.today{box-shadow:0 0 0 2px var(--accent)}
.progress-cell.rest-day{background:var(--surface2);border-color:var(--border);color:var(--text3)}
.progress-cell.skipped{background:rgba(255,107,107,.08);border-color:rgba(255,107,107,.35);color:var(--accent3)}
.progress-legend{display:flex;gap:16px;margin-top:8px;font-size:.7rem;color:var(--text2);flex-wrap:wrap}
.legend-dot{width:10px;height:10px;border-radius:3px;display:inline-block;margin-right:4px;vertical-align:middle}

/* Body weight tracking */
.weight-section{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:16px 20px;margin-bottom:16px;transition:.2s}
.weight-section:hover{border-color:rgba(108,99,255,.3);box-shadow:0 0 16px var(--glow-accent)}
.weight-section h3{font-size:.85rem;font-weight:600;margin-bottom:10px}
.weight-row{display:flex;gap:8px;align-items:end}
.weight-row input{background:var(--surface3);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:8px 10px;font-size:.85rem;outline:none;width:100px}
.weight-row input:focus{border-color:var(--accent)}
.weight-row button{background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;color:#fff;padding:8px 16px;border-radius:8px;cursor:pointer;font-size:.82rem;font-weight:600;transition:.2s}
.weight-row button:hover{box-shadow:0 0 16px var(--glow-accent)}
.weight-history{margin-top:10px;font-size:.75rem;color:var(--text2);max-height:80px;overflow-y:auto}
.weight-entry{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid var(--border)}

/* Dashboard */
.dashboard{padding-bottom:40px}
.dash-card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:20px;margin-bottom:16px;transition:.2s}
.dash-card:hover{border-color:rgba(108,99,255,.3);box-shadow:0 0 16px var(--glow-accent)}
.dash-card h3{font-size:.9rem;font-weight:600;margin-bottom:12px;color:var(--text)}
.ring-container{display:flex;align-items:center;gap:24px;justify-content:center}
.ring-wrap{position:relative;width:120px;height:120px}
.ring-label{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-val{font-size:1.4rem;font-weight:700;color:var(--accent2)}
.ring-sub{font-size:.65rem;color:var(--text2)}
.weekly-bars{display:flex;align-items:flex-end;gap:4px;height:100px;padding:10px 0}
.week-bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.week-bar{width:100%;border-radius:4px 4px 0 0;background:var(--surface3);position:relative;min-height:2px;transition:.3s}
.week-bar-fill{position:absolute;bottom:0;width:100%;border-radius:4px 4px 0 0;background:linear-gradient(0deg,var(--accent),var(--accent2));transition:.3s}
.week-bar-label{font-size:.55rem;color:var(--text3)}
.cardio-table{width:100%;border-collapse:collapse;font-size:.75rem}
.cardio-table th{text-align:left;color:var(--text2);font-weight:600;padding:6px 8px;border-bottom:1px solid var(--border)}
.cardio-table td{padding:6px 8px;border-bottom:1px solid var(--border);color:var(--text2)}
.cardio-table tr:hover td{background:var(--surface2)}
.export-btn{background:var(--surface2);border:1px solid var(--border);color:var(--accent2);padding:10px 20px;border-radius:8px;cursor:pointer;font-size:.82rem;font-weight:600;transition:.15s;display:inline-flex;align-items:center;gap:6px}
.export-btn:hover{background:var(--accent2);color:#fff;border-color:var(--accent2)}

/* Responsive */
@media(max-width:600px){
  .stats{grid-template-columns:repeat(2,1fr)}
  .app{padding:10px}
  .exercise-row{padding:10px 14px}
  .set-input{width:60px;font-size:.85rem;padding:8px 6px}
  .set-group{gap:3px}
  .set-label{font-size:.65rem}
  .set-field-lbl{font-size:.6rem}
  .ex-check{width:28px;height:28px}
  .timer-btn{padding:6px 14px;font-size:.75rem}
  .timer-row{padding-left:42px}
  .cardio-field input,.cardio-field select{width:100%}
  .cardio-row{gap:10px}
}

/* Customize button & sheet */
.customize-bar{display:flex;gap:8px;padding:12px 20px;background:var(--surface2);border-top:1px solid var(--border)}
.customize-btn{flex:1;background:var(--surface3);border:1px solid var(--border);color:var(--text2);padding:8px 12px;border-radius:8px;font-size:.78rem;cursor:pointer;transition:.15s;display:flex;align-items:center;justify-content:center;gap:6px}
.customize-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.override-banner{padding:8px 20px;background:rgba(255,165,0,.1);border-bottom:1px solid rgba(255,165,0,.25);font-size:.72rem;color:#ffa500;display:flex;justify-content:space-between;align-items:center}
.override-banner button{background:transparent;border:1px solid rgba(255,165,0,.4);color:#ffa500;padding:3px 8px;border-radius:5px;font-size:.68rem;cursor:pointer}
.override-banner button:hover{background:rgba(255,165,0,.2)}

.sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.sheet{background:var(--surface);border:1px solid var(--border);border-radius:14px;max-width:440px;width:100%;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.sheet-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.sheet-title{font-size:1rem;font-weight:700}
.sheet-close{background:none;border:none;color:var(--text2);font-size:1.2rem;cursor:pointer;padding:4px 8px}
.sheet-body{padding:16px 20px}
.sheet-section{margin-bottom:18px}
.sheet-section-title{font-size:.68rem;text-transform:uppercase;letter-spacing:1px;color:var(--text2);margin-bottom:8px;font-weight:700}
.sheet-option{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;cursor:pointer;margin-bottom:6px;transition:.15s}
.sheet-option:hover{border-color:var(--accent);background:var(--surface3)}
.sheet-option .opt-name{font-size:.88rem;font-weight:500}
.sheet-option .opt-desc{font-size:.7rem;color:var(--text3);margin-top:2px}
.sheet-option .opt-arrow{color:var(--accent2);font-size:.9rem}

/* Ghost placeholder — same grey as normal, just shows last week's number */
.set-input.has-prev::placeholder{color:var(--text3);opacity:.85}
/* Typed value — teal + bold to confirm logged data */
.set-input:not(:placeholder-shown){color:var(--accent2);font-weight:700}
/* lbs / reps sub-labels */
.set-field{display:flex;flex-direction:column;align-items:center;gap:1px}
.set-field-lbl{font-size:.55rem;color:var(--text3);text-transform:uppercase;letter-spacing:.3px}

/* Free build */
.free-header{padding:14px 20px;border-bottom:1px solid var(--border)}
.free-input{width:100%;background:var(--surface3);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:8px 10px;font-size:.88rem;outline:none;margin-bottom:8px;font-family:inherit}
.free-input:focus{border-color:var(--accent)}
.free-input.title{font-size:1rem;font-weight:600}
.free-notes{min-height:50px;resize:vertical}
.free-ex-list{padding:8px 20px}
.free-ex-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px}
.free-ex-row{display:flex;gap:6px;margin-bottom:6px;align-items:center}
.free-ex-row .fe-name{flex:1;background:var(--surface3);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:6px 8px;font-size:.85rem;outline:none}
.free-ex-row .fe-num{width:52px;background:var(--surface3);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:6px 4px;font-size:.78rem;text-align:center;outline:none}
.fe-remove{background:transparent;border:1px solid var(--border);color:var(--accent3);border-radius:6px;padding:4px 8px;font-size:.75rem;cursor:pointer}
.fe-remove:hover{background:var(--accent3);color:#fff;border-color:var(--accent3)}
.fe-hint{font-size:.65rem;color:var(--text3);margin-top:2px}
.add-ex-btn{display:block;width:calc(100% - 40px);margin:0 20px 12px;padding:10px;background:var(--surface2);border:1px dashed var(--border);color:var(--accent2);border-radius:10px;cursor:pointer;font-size:.82rem;font-weight:600;transition:.15s}
.add-ex-btn:hover{border-color:var(--accent2);background:var(--surface3)}

/* Scrollbar */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:2px}
</style>
</head>
<body>
<div class="app" id="app"></div>
<script>

// ── Data ──

const PROGRAM = {

        { label: null, exercises: [

        ]},

          { name: 'Hammer Curl', sets: 3, reps: '15', note: 'Neutral grip, hits brachialis' },
        ]},
        { label: 'Superset C', exercises: [
          { name: 'Reverse Fly Machine', sets: 3, reps: '15-20' },
          { name: 'Straight-Arm Pulldown', sets: 3, reps: '15', note: 'Cable with rope, isolates lats' },
        ]},
        { label: null, exercises: [
          { name: 'Light Shrugs (DB)', sets: 2, reps: '20', note: 'Moderate weight. Maintain, not build.' },
          { name: 'Cool-Down / Stretch', sets: 0, reps: '5 min', note: 'Lats, biceps, thoracic spine', trackWeight: false, isCooldown: true },

      ]

    {

    },

    },
  ]
};

const CARDIO_STEPS_ZONE2 = [
  'Pick your machine below.',
  'Warm up for 3 minutes at an easy pace.',
  'Settle into a pace where you can hold a full conversation but feel like you\'re working.',
  'Keep your heart rate between 120\u2013140 bpm for 45\u201355 minutes.',
  'Cool down for 2 minutes, then log your stats below.'
];

const CARDIO_STEPS_ZONE2_HIIT = [
  'Pick your machine below.',
  'Warm up for 3 minutes at an easy pace.',
  'Settle into a conversational pace and keep your heart rate between 120\u2013140 bpm for 30 minutes.',
  'HIIT finisher: increase intensity to max effort for 30 seconds, then recover easy for 90 seconds. Repeat 5 times.',
  'Cool down for 3\u20135 minutes at an easy pace, then log your stats below. Total time: approximately 45 minutes.'
];

const CARDIO_STEPS_ZONE45 = [
  'Pick your machine below.',
  'Warm up for 5 minutes at an easy pace.',
  'Ramp up to a hard effort \u2014 you should only be able to get out a few words at a time. This is uncomfortable but sustainable.',
  'Hold that intensity. Keep your heart rate between 160\u2013180 bpm for 20\u201330 minutes.',
  'Cool down for 3\u20135 minutes at an easy pace, then log your stats below.'
];

// ── State ──
const STATE_KEY = 'frank_slimdown_v3';
let state = loadState();
let currentWeek = getCurrentWeekIndex();
let currentDay = getTodayDayIndex();
let activeView = 'workout';
let activeTimer = null;

function loadState() {
  try {
    const s = JSON.parse(localStorage.getItem(STATE_KEY));
    if (s) return s;
    // Migrate from older versions
    for (const k of ['frank_slimdown_v2', 'frank_slimdown_v1']) {
      const old = JSON.parse(localStorage.getItem(k));
      if (old) return old;
    }
    return { workouts: {}, weights: [], cardioPrefs: {} };
  } catch { return { workouts: {}, weights: [], cardioPrefs: {} }; }
}
function saveState() { localStorage.setItem(STATE_KEY, JSON.stringify(state)); }

function getCurrentWeekIndex() {
  const start = new Date(PROGRAM.startDate + 'T00:00:00');
  const startMonday = new Date(start);
  const startDow = start.getDay();
  startMonday.setDate(start.getDate() - (startDow === 0 ? 6 : startDow - 1));
  const now = new Date(); now.setHours(0,0,0,0);
  const diff = Math.floor((now - startMonday) / (7 * 864e5));
  return Math.max(0, Math.min(diff, PROGRAM.weeks - 1));
}

function getTodayDayIndex() {
  const d = new Date().getDay();
  return d === 0 ? 6 : d - 1;
}

function getWeekStart(weekIdx) {
  const start = new Date(PROGRAM.startDate + 'T00:00:00');
  const startDow = start.getDay();
  const startMonday = new Date(start);
  startMonday.setDate(start.getDate() - (startDow === 0 ? 6 : startDow - 1));
  const d = new Date(startMonday);
  d.setDate(d.getDate() + weekIdx * 7);
  return d;
}

function isHiitWeek(weekIdx) {
  return weekIdx % 2 === 1; // odd 0-indexed weeks = HIIT
}

function dateKey(weekIdx, dayIdx) { return `w${weekIdx}d${dayIdx}`; }
function getWorkout(wk, dy) { return state.workouts[dateKey(wk, dy)] || {}; }
function setWorkout(wk, dy, data) { state.workouts[dateKey(wk, dy)] = data; saveState(); }

// Look backward through previous weeks to find the most recent set data
// for a given day index + exercise index. Skips weeks that were overridden.
function getPrevWeekSet(wk, dy, exIdx, setIdx) {
  for (let pw = wk - 1; pw >= 0; pw--) {
    const pWo = getWorkout(pw, dy);
    if (pWo.override) continue;
    if (pWo.sets && pWo.sets[exIdx] && pWo.sets[exIdx][setIdx]) {
      const s = pWo.sets[exIdx][setIdx];
      if (s.w || s.r) return s;
    }
  }
  return null;
}

// Resolve the effective day to render: handles swap and rest overrides.
function resolveDay(wk, dy) {
  const wo = getWorkout(wk, dy);
  if (wo.override) {
    if (wo.override.mode === 'swap' && wo.override.swapDayIdx != null)
      return PROGRAM.days[wo.override.swapDayIdx];
    if (wo.override.mode === 'rest')
      return { rest: true, type: 'Rest / Skipped', name: PROGRAM.days[dy].name };
  }
  return PROGRAM.days[dy];
}

function countExercises(day) {
  if (!day.groups) return 0;
  let n = 0;
  day.groups.forEach(g => { n += g.exercises.length; });
  return n;
}
function countChecked(wo) {
  if (!wo.checks) return 0;
  return Object.values(wo.checks).filter(Boolean).length;
}

// ── Rendering ──
function render() {
  // Cancel any running rest timer before rebuilding the DOM (prevents phantom vibrations)
  if (activeTimer) {
    clearInterval(activeTimer.interval);
    activeTimer = null;
  }
  const app = document.getElementById('app');
  const ws = getWeekStart(currentWeek);
  const we = new Date(ws); we.setDate(we.getDate() + 6);
  const fmt = d => d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  const startFmt = new Date(PROGRAM.startDate + 'T00:00:00');

  const isActiveDay = (w, d) => {
    const wo = getWorkout(w, d);
    if (wo.override && wo.override.mode === 'rest') return false; // skipped days don't count
    if (wo.override) return true; // swap/free overrides count as workouts
    return !PROGRAM.days[d].rest;
  };

  let totalWorkouts = 0, totalComplete = 0;
  for (let w = 0; w < PROGRAM.weeks; w++) {
    for (let d = 0; d < 7; d++) {
      if (!isActiveDay(w, d)) continue;
      totalWorkouts++;
      if (getWorkout(w, d).completed) totalComplete++;
    }
  }

  let weekWorkouts = 0, weekComplete = 0;
  for (let d = 0; d < 7; d++) {
    if (!isActiveDay(currentWeek, d)) continue;
    weekWorkouts++;
    if (getWorkout(currentWeek, d).completed) weekComplete++;
  }

  let streak = 0;
  const today = new Date(); today.setHours(0,0,0,0);
  const progStart = getWeekStart(0);
  for (let i = 0; i < 200; i++) {
    const chk = new Date(today); chk.setDate(chk.getDate() - i);
    if (chk < progStart) break;
    const dow = chk.getDay() === 0 ? 6 : chk.getDay() - 1;
    if (PROGRAM.days[dow].rest) continue;
    const wkIdx = Math.floor((chk - progStart) / (7 * 864e5));
    if (wkIdx < 0 || wkIdx >= PROGRAM.weeks) break;
    const sWo = getWorkout(wkIdx, dow);
    if (sWo.override && sWo.override.mode === 'rest') continue; // skipped days don't break streak
    if (sWo.completed) streak++;
    else break;
  }

  app.innerHTML = `
    <div class="header">
      <h1>${DUMBBELL_SVG} Jimmy</h1>
      <p>${PROGRAM.weeks}-Week Program &middot; Started ${fmt(startFmt)}</p>
    </div>

    <div class="view-toggle">
      <div class="view-btn ${activeView === 'workout' ? 'active' : ''}" onclick="switchView('workout')">Workout</div>
      <div class="view-btn ${activeView === 'dashboard' ? 'active' : ''}" onclick="switchView('dashboard')">Dashboard</div>
    </div>

    ${activeView === 'dashboard' ? renderDashboard() : `
    <div class="stats">
      <div class="stat"><div class="stat-val">${weekComplete}/${weekWorkouts}</div><div class="stat-label">This Week</div></div>
      <div class="stat"><div class="stat-val">${totalComplete}</div><div class="stat-label">Total Done</div></div>
      <div class="stat"><div class="stat-val">${streak}</div><div class="stat-label">Streak</div></div>
      <div class="stat"><div class="stat-val">${currentWeek + 1}/${PROGRAM.weeks}</div><div class="stat-label">Week</div></div>
    </div>

    <div class="week-nav">
      <button onclick="navWeek(-1)" ${currentWeek === 0 ? 'disabled' : ''}>&larr; Prev</button>
      <div style="text-align:center">
        <div class="week-label">Week ${currentWeek + 1}</div>
        <div class="week-dates">${fmt(ws)} &mdash; ${fmt(we)}</div>
      </div>
      <button onclick="navWeek(1)" ${currentWeek >= PROGRAM.weeks - 1 ? 'disabled' : ''}>Next &rarr;</button>
    </div>

    <div class="day-tabs">
      ${PROGRAM.days.map((d, i) => {
        const wo = getWorkout(currentWeek, i);
        const isActive = i === currentDay;
        const tabDate = new Date(ws); tabDate.setDate(tabDate.getDate() + i);
        const tabDateStr = tabDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        const cls = [
          'day-tab',
          isActive ? 'active' : '',
          wo.completed ? 'completed' : '',
          d.rest ? 'rest' : ''
        ].filter(Boolean).join(' ');
        return `<div class="${cls}" onclick="selectDay(${i})">
          ${wo.completed ? '<span class="day-check">&#10003;</span>' : ''}
          <div class="day-name">${d.name.slice(0, 3)}</div>
          <div class="day-date">${tabDateStr}</div>
          <div class="day-type">${d.type}</div>
        </div>`;
      }).join('')}
    </div>

    ${renderDay(currentWeek, currentDay)}

    ${renderWeightSection()}

    ${renderProgress()}
    `}
  `;

  if (activeView === 'workout') {
    requestAnimationFrame(checkAllDone);
  }
}

function renderWeightSection() {
  const entries = (state.weights || []).slice(-7).reverse();
  return `<div class="weight-section">
    <h3>Body Weight</h3>
    <div class="weight-row">
      <input type="number" id="weightInput" placeholder="lbs" step="0.1" onkeydown="if(event.key==='Enter')logWeight()">
      <button onclick="logWeight()">Log</button>
    </div>
    ${entries.length ? `<div class="weight-history">${entries.map(e =>
      `<div class="weight-entry"><span>${e.date}</span><span>${e.value} lbs</span></div>`
    ).join('')}</div>` : ''}
  </div>`;
}

function renderDay(wk, dy) {
  const originalDay = PROGRAM.days[dy];
  const wo = getWorkout(wk, dy);
  const dayDate = new Date(getWeekStart(wk)); dayDate.setDate(dayDate.getDate() + dy);
  const dayDateStr = dayDate.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });

  // Handle free-build override
  if (wo.override && wo.override.mode === 'free') {
    return renderFreeBuildDay(wk, dy, wo, dayDateStr);
  }

  // Handle skipped / rest override
  if (wo.override && wo.override.mode === 'rest') {
    return `<div class="workout">
      <div class="workout-header">
        <div><div class="workout-title">Rest / Skipped</div><div class="workout-subtitle">${dayDateStr}</div></div>
        <span class="workout-badge badge-rest">Skipped</span>
      </div>
      <div class="override-banner"><span>&#128683; ${originalDay.type} voided for this week</span><button onclick="resetOverride(${wk},${dy})">Restore</button></div>
      <div class="rest-content">
        <div class="icon">&#128683;</div>
        <p>You marked this day as skipped. No worries — rest and come back stronger.</p>
      </div>
      ${renderCustomizeBar(wk, dy)}
    </div>`;
  }

  // Handle swap override
  const day = (wo.override && wo.override.mode === 'swap' && wo.override.swapDayIdx != null)
    ? PROGRAM.days[wo.override.swapDayIdx]
    : originalDay;
  const isSwapped = day !== originalDay;
  const overrideBanner = isSwapped
    ? `<div class="override-banner"><span>Swapped from ${originalDay.type} &rarr; ${day.type}</span><button onclick="resetOverride(${wk},${dy})">Reset</button></div>`
    : '';

  if (day.rest) {
    return `<div class="workout">
      <div class="workout-header">
        <div><div class="workout-title">${day.type}</div><div class="workout-subtitle">${dayDateStr}</div></div>
        <span class="workout-badge ${day.badge}">${day.type}</span>
      </div>
      ${overrideBanner}
      <div class="rest-content">
        <div class="icon">&#129702;</div>
        <p>${day.restNote}</p>
      </div>
      ${renderCustomizeBar(wk, dy)}
    </div>`;
  }

  if (day.cardio) {
    return renderCardioDay(wk, dy, day, wo, dayDateStr, overrideBanner);
  }

  // Lifting day
  const checks = wo.checks || {};
  const sets = wo.sets || {};
  let exIdx = 0;
  const totalEx = countExercises(day);
  const doneEx = countChecked(wo);
  const pct = totalEx > 0 ? (doneEx / totalEx * 100) : 0;

  return `<div class="workout">
    <div class="workout-header">
      <div><div class="workout-title">${day.type}</div><div class="workout-subtitle">${dayDateStr} &middot; ${day.label}</div></div>
      <span class="workout-badge ${day.badge}">${day.type.split(' ').pop()}</span>
    </div>
    ${overrideBanner}
    <div class="workout-progress"><div class="workout-progress-fill" style="width:${pct}%"></div></div>
    <div class="exercise-group">
      ${day.groups.map(g => {
        const isSuperset = !!g.label;
        let html = '';
        if (isSuperset) {
          html += `<div class="superset-row">
            <span class="superset-label">${g.label}</span>
            <span class="superset-line"></span>
          </div>`;
        }
        html += g.exercises.map(ex => {
          const idx = exIdx++;
          const checked = checks[idx];
          const trackW = ex.trackWeight !== false && ex.sets > 0;
          const setData = sets[idx] || {};
          // Show rest note for standalone (non-superset) exercises that are not warmup/cooldown
          const isStandalone = !isSuperset && !ex.isWarmup && !ex.isCooldown && ex.sets > 0;
          const restNote = isStandalone && !ex.note?.includes('rest') ? '<div class="ex-rest">Rest: 90 sec</div>' : '';
          return `<div class="exercise-row">
            <div class="ex-check ${checked ? 'checked' : ''}" onclick="toggleExercise(${wk},${dy},${idx})"></div>
            <div class="ex-info">
              <div class="ex-name">${ex.name}</div>
              <div class="ex-detail">${ex.sets > 0 ? ex.sets + ' sets x ' + ex.reps : ex.reps}</div>
              ${ex.note ? `<div class="ex-note">${ex.note}</div>` : ''}
              ${restNote}
              ${trackW ? `<div class="ex-sets">${Array.from({length: ex.sets}, (_, s) => {
                const sv = setData[s] || {};
                // Look up last week's set for ghost placeholder
                const prev = isSwapped ? null : getPrevWeekSet(wk, dy, idx, s);
                const wPh = prev && prev.w ? prev.w : 'lbs';
                const rPh = prev && prev.r ? prev.r : 'reps';
                const wCls = prev && prev.w ? 'set-input has-prev' : 'set-input';
                const rCls = prev && prev.r ? 'set-input has-prev' : 'set-input';
                return `<div class="set-group">
                  <div class="set-label">Set ${s+1}</div>
                  <div class="set-pair">
                    <div class="set-field">
                      <input class="${wCls}" type="number" placeholder="${wPh}" value="${sv.w || ''}"
                        onchange="updateSet(${wk},${dy},${idx},${s},'w',this.value)" onblur="flashSaved(this)">
                      <span class="set-field-lbl">lbs</span>
                    </div>
                    <div class="set-field">
                      <input class="${rCls}" type="number" placeholder="${rPh}" value="${sv.r || ''}"
                        onchange="updateSet(${wk},${dy},${idx},${s},'r',this.value)" onblur="flashSaved(this)">
                      <span class="set-field-lbl">reps</span>
                    </div>
                  </div>
                </div>`;
              }).join('')}</div>` : ''}
            </div>
          </div>`;
        }).join('');
        // Timer after last exercise in superset
        if (isSuperset) {
          html += `<div class="timer-row"><button class="timer-btn" onclick="startTimer(this)">&#9201; Rest 60s</button></div>`;
        }
        return html;
      }).join('')}
    </div>
    <button class="complete-btn ${wo.completed ? 'done' : ''}" id="completeBtn" onclick="toggleComplete(${wk},${dy})">
      ${wo.completed ? '&#10003; Completed' : 'Mark Complete'}
    </button>
    ${renderCustomizeBar(wk, dy)}
  </div>`;
}

function renderCustomizeBar(wk, dy) {
  return `<div class="customize-bar">
    <button class="customize-btn" onclick="openCustomize(${wk},${dy})">&#9881; Swap / Customize Workout</button>
  </div>`;
}

function renderCardioDay(wk, dy, day, wo, dayDateStr, overrideBanner) {
  const cd = wo.cardio || {};
  const isThursday = day.cardioType === 'thursday';
  const isZone45 = day.cardioType === 'zone45';
  const thuHiitFinisher = isThursday && isHiitWeek(wk);

  let steps, bannerText, bannerClass, stepTitle;
  if (isZone45) {
    steps = CARDIO_STEPS_ZONE45;
    bannerText = 'Zone 4\u20135 High Intensity';
    bannerClass = 'zone45';
    stepTitle = 'Zone 4\u20135 Cardio \u2014 Follow These Steps';
  } else if (isThursday) {
    if (thuHiitFinisher) {
      steps = CARDIO_STEPS_ZONE2_HIIT;
      bannerText = `This Week: Zone 2 + HIIT Finisher (Week ${wk + 1})`;
      bannerClass = 'hiit';
      stepTitle = 'Zone 2 + HIIT Finisher \u2014 Follow These Steps';
    } else {
      steps = CARDIO_STEPS_ZONE2;
      bannerText = `This Week: Zone 2 Steady State (Week ${wk + 1})`;
      bannerClass = 'zone2';
      stepTitle = 'Zone 2 Cardio \u2014 Follow These Steps';
    }
  }

  const prefKey = day.cardioType;
  const savedType = (state.cardioPrefs && state.cardioPrefs[prefKey]) || '';
  const currentType = cd.type || savedType || day.cardioOptions[0];

          </select>

          <label>What did you do?</label>
          <input type="text" value="${cd.customType || ''}" placeholder="e.g. Swimming"

function renderProgress() {
  const today = new Date(); today.setHours(0,0,0,0);
  const dayLabels = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  let html = `<div class="progress-section">
    <h2>Program Progress</h2>
    <div class="progress-day-headers">
      ${dayLabels.map(d => `<div class="progress-day-header">${d}</div>`).join('')}
    </div>
    <div class="progress-grid">`;
  for (let w = 0; w < PROGRAM.weeks; w++) {
    for (let d = 0; d < 7; d++) {
      const day = PROGRAM.days[d];
      const cellDate = new Date(getWeekStart(w)); cellDate.setDate(cellDate.getDate() + d);
      const isToday = cellDate.getTime() === today.getTime();
      let cls = 'progress-cell';
      if (isToday) cls += ' today';
      const wo = getWorkout(w, d);
      const isRest = day.rest && !wo.override;
      const isSkipped = wo.override && wo.override.mode === 'rest';
      if (isSkipped) {
        cls += ' skipped';
      } else if (isRest) {
        cls += ' rest-day';
      } else {
        if (wo.completed) cls += ' full';
        else if ((wo.checks && Object.keys(wo.checks).length > 0) ||
                 (wo.sets && Object.keys(wo.sets).length > 0) ||
                 (wo.freeBuild && wo.freeBuild.exercises && wo.freeBuild.exercises.length > 0) ||
                 wo.cardio) cls += ' partial';
      }
      const label = d === 0 ? `W${w+1}` : '';
      html += `<div class="${cls}" title="Week ${w+1}, ${day.name}" onclick="navToCell(${w},${d})">${label}</div>`;
    }
  }
  html += `</div>
    <div class="progress-legend">
      <span><span class="legend-dot" style="background:var(--green-bg);border:1px solid var(--green)"></span> Done</span>
      <span><span class="legend-dot" style="background:rgba(255,217,61,.1);border:1px solid var(--accent4)"></span> Partial</span>
      <span><span class="legend-dot" style="background:var(--surface2);border:1px solid var(--border)"></span> Rest</span>
      <span><span class="legend-dot" style="background:rgba(255,107,107,.08);border:1px solid rgba(255,107,107,.35)"></span> Skipped</span>
      <span><span class="legend-dot" style="background:var(--surface);border:1px solid var(--border)"></span> Upcoming</span>
      <span><span class="legend-dot" style="border:2px solid var(--accent);background:transparent"></span> Today</span>
    </div>
  </div>`;
  return html;
}

function renderDashWeightChart() {
  const entries = (state.weights || []).slice(-30);
  if (entries.length < 2) return `<div class="dash-card"><h3>Body Weight Trend</h3><p style="color:var(--text3);font-size:.82rem">Log at least 2 weigh-ins to see your trend.</p></div>`;
  const vals = entries.map(e => e.value);
  const min = Math.min(...vals) - 1;
  const max = Math.max(...vals) + 1;
  const range = max - min || 1;
  const w = 100, h = 60;
  const points = entries.map((e, i) => {
    const x = entries.length === 1 ? w/2 : (i / (entries.length - 1)) * w;
    const y = h - ((e.value - min) / range) * h;
    return `${x},${y}`;
  });
  const polyline = points.join(' ');
  const areaPoints = `0,${h} ${polyline} ${w},${h}`;
  return `<div class="dash-card"><h3>Body Weight Trend</h3>
    <div style="display:flex;justify-content:space-between;font-size:.7rem;color:var(--text3);margin-bottom:4px">
      <span>${entries[0].date}</span><span>${entries[entries.length-1].date}</span>
    </div>
    <svg viewBox="-2 -2 ${w+4} ${h+4}" style="width:100%;height:160px">
      <defs><linearGradient id="wg" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="var(--accent2)" stop-opacity=".3"/>
        <stop offset="100%" stop-color="var(--accent2)" stop-opacity="0"/>
      </linearGradient></defs>
      <polygon points="${areaPoints}" fill="url(#wg)"/>
      <polyline points="${polyline}" fill="none" stroke="var(--accent2)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      ${entries.map((e, i) => {
        const x = entries.length === 1 ? w/2 : (i / (entries.length - 1)) * w;
        const y = h - ((e.value - min) / range) * h;
        return `<circle cx="${x}" cy="${y}" r="2" fill="var(--accent2)"><title>${e.date}: ${e.value} lbs</title></circle>`;
      }).join('')}
    </svg>
    <div style="display:flex;justify-content:space-between;font-size:.7rem;color:var(--text2)">
      <span>Low: ${Math.min(...vals).toFixed(1)} lbs</span>
      <span>Current: ${vals[vals.length-1].toFixed(1)} lbs</span>
      <span>High: ${Math.max(...vals).toFixed(1)} lbs</span>
    </div>
  </div>`;
}

function renderDashCompletion() {
  let total = 0, done = 0;
  for (let w = 0; w < PROGRAM.weeks; w++) {
    for (let d = 0; d < 7; d++) {
      if (PROGRAM.days[d].rest) continue;
      const wo = getWorkout(w, d);
      if (wo.override && wo.override.mode === 'rest') continue; // skipped days excluded
      total++;
      if (wo.completed) done++;
    }
  }
  const pct = total > 0 ? Math.round(done / total * 100) : 0;
  const r = 44, c = 2 * Math.PI * r;
  const offset = c - (pct / 100) * c;
  return `<div class="dash-card"><h3>Overall Completion</h3>
    <div class="ring-container">
      <div class="ring-wrap">
        <svg viewBox="0 0 100 100">
          <circle cx="50" cy="50" r="${r}" fill="none" stroke="var(--surface3)" stroke-width="8"/>
          <circle cx="50" cy="50" r="${r}" fill="none" stroke="var(--accent2)" stroke-width="8"
            stroke-dasharray="${c}" stroke-dashoffset="${offset}" stroke-linecap="round"
            transform="rotate(-90 50 50)" style="transition:stroke-dashoffset .5s ease"/>
        </svg>
        <div class="ring-label"><span class="ring-val">${pct}%</span><span class="ring-sub">${done}/${total} workouts</span></div>
      </div>
    </div>
  </div>`;
}

function renderDashWeeklyBars() {
  const weeks = [];
  for (let w = 0; w < PROGRAM.weeks; w++) {
    let total = 0, done = 0;
    for (let d = 0; d < 7; d++) {
      if (PROGRAM.days[d].rest) continue;
      const wo = getWorkout(w, d);
      if (wo.override && wo.override.mode === 'rest') continue; // skipped days excluded
      total++;
      if (wo.completed) done++;
    }
    weeks.push({ pct: total > 0 ? Math.round(done / total * 100) : 0 });
  }
  const maxH = 80;
  return `<div class="dash-card"><h3>Weekly Completion Rate</h3>
    <div class="weekly-bars">
      ${weeks.map((w, i) => `<div class="week-bar-wrap">
        <div class="week-bar" style="height:${maxH}px">
          <div class="week-bar-fill" style="height:${w.pct}%"></div>
        </div>
        <div class="week-bar-label">${i+1}</div>
      </div>`).join('')}
    </div>
  </div>`;
}

function renderDashCardioLog() {
  const rows = [];
  for (let w = 0; w < PROGRAM.weeks; w++) {
    for (let d = 0; d < 7; d++) {
      const day = PROGRAM.days[d];
      if (!day.cardio) continue;
      const wo = getWorkout(w, d);
      if (!wo.cardio && !wo.completed) continue;
      const cd = wo.cardio || {};
      const cellDate = new Date(getWeekStart(w));
      cellDate.setDate(cellDate.getDate() + d);
      const dateStr = cellDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
      rows.push({ date: dateStr, type: cd.customType || cd.type || '-', duration: cd.duration || '-', hr: cd.hr || '-', cals: cd.cals || '-' });
    }
  }
  if (!rows.length) return `<div class="dash-card"><h3>Cardio Log</h3><p style="color:var(--text3);font-size:.82rem">No cardio sessions logged yet.</p></div>`;
  return `<div class="dash-card"><h3>Cardio Log</h3>
    <div style="overflow-x:auto">
    <table class="cardio-table">
      <thead><tr><th>Date</th><th>Activity</th><th>Duration</th><th>Avg HR</th><th>Calories</th></tr></thead>
      <tbody>${rows.map(r => `<tr><td>${r.date}</td><td>${r.type}</td><td>${r.duration}${r.duration !== '-' ? ' min' : ''}</td><td>${r.hr}${r.hr !== '-' ? ' bpm' : ''}</td><td>${r.cals}</td></tr>`).join('')}</tbody>
    </table>
    </div>
  </div>`;
}

function switchView(v) { activeView = v; render(); }

// ── Customize / Swap / Free Build ──
function openCustomize(wk, dy) {
  const originalDay = PROGRAM.days[dy];
  const wo = getWorkout(wk, dy);
  const hasOverride = !!wo.override;

  // Build swap options: all non-rest program days except the current original one
  const swapOptions = PROGRAM.days
    .map((d, i) => ({ d, i }))
    .filter(x => !x.d.rest && x.i !== dy);

  const sheet = document.createElement('div');
  sheet.className = 'sheet-overlay';
  sheet.id = 'customizeSheet';
  sheet.onclick = (e) => { if (e.target === sheet) closeCustomize(); };
  sheet.innerHTML = `<div class="sheet">
    <div class="sheet-header">
      <div><div class="sheet-title">Customize ${originalDay.name}</div>
      <div style="font-size:.72rem;color:var(--text3);margin-top:2px">${originalDay.rest ? 'Add a workout to your rest day.' : 'Swap in a different workout, or build your own.'}</div></div>
      <button class="sheet-close" onclick="closeCustomize()">&times;</button>
    </div>
    <div class="sheet-body">
      <div class="sheet-section">
        <div class="sheet-section-title">Swap to Another Workout</div>
        ${swapOptions.map(x => `<div class="sheet-option" onclick="applySwap(${wk},${dy},${x.i})">
          <div><div class="opt-name">${x.d.type}</div><div class="opt-desc">${x.d.label || ''}</div></div>
          <span class="opt-arrow">&rarr;</span>
        </div>`).join('')}
      </div>
      <div class="sheet-section">
        <div class="sheet-section-title">Or Build Your Own</div>
        <div class="sheet-option" onclick="applyFreeBuild(${wk},${dy})">
          <div><div class="opt-name">Free Workout</div><div class="opt-desc">Add your own exercises or log an off-plan session</div></div>
          <span class="opt-arrow">+</span>
        </div>
      </div>
      ${!originalDay.rest ? `<div class="sheet-section">
        <div class="sheet-section-title">Missed This Day?</div>
        <div class="sheet-option" style="border-color:rgba(255,107,107,.25)" onclick="applyRestOverride(${wk},${dy})">
          <div><div class="opt-name" style="color:var(--accent3)">Mark as Skipped / Rest</div><div class="opt-desc">Void this workout — shows as skipped in your progress grid</div></div>
          <span class="opt-arrow" style="color:var(--accent3)">&#128683;</span>
        </div>
      </div>` : ''}
      ${hasOverride ? `<div class="sheet-section">
        <div class="sheet-option" style="border-color:rgba(255,107,107,.3)" onclick="resetOverride(${wk},${dy});closeCustomize()">

function closeCustomize() {
  const s = document.getElementById('customizeSheet');
  if (s) s.remove();
}
// Archive the currently-active workout state into wo.archive[key]
// and return the workout object so callers can load another slot.
function archiveActive(wo, dy) {
  // Rest overrides hold no workout data — archiving would overwrite the real slot with empty data
  if (wo.override && wo.override.mode === 'rest') return;
  const key = wo.override && wo.override.mode === 'swap' ? String(wo.override.swapDayIdx) :
              wo.override && wo.override.mode === 'free' ? 'free' :
              String(dy);
  if (!wo.archive) wo.archive = {};
  wo.archive[key] = {
    checks: wo.checks, sets: wo.sets, cardio: wo.cardio, completed: wo.completed,
    freeBuild: wo.freeBuild
  };
}
function loadFromArchive(wo, key) {
  const a = (wo.archive && wo.archive[key]) || {};
  wo.checks = a.checks;
  wo.sets = a.sets;
  wo.cardio = a.cardio;
  wo.completed = a.completed || false;
  wo.freeBuild = a.freeBuild;
  if (!wo.checks) delete wo.checks;
  if (!wo.sets) delete wo.sets;
  if (!wo.cardio) delete wo.cardio;
  if (!wo.completed) delete wo.completed;
  if (!wo.freeBuild) delete wo.freeBuild;
}

function applySwap(wk, dy, swapIdx) {
  const wo = getWorkout(wk, dy);
  archiveActive(wo, dy);
  wo.override = { mode: 'swap', swapDayIdx: swapIdx };
  loadFromArchive(wo, String(swapIdx));
  setWorkout(wk, dy, wo);
  closeCustomize();
  render();
}
function applyRestOverride(wk, dy) {
  const wo = getWorkout(wk, dy);
  archiveActive(wo, dy);
  wo.override = { mode: 'rest' };
  wo.completed = false;
  delete wo.checks;
  delete wo.sets;
  delete wo.cardio;
  setWorkout(wk, dy, wo);
  closeCustomize();
  render();
}
function applyFreeBuild(wk, dy) {
  const wo = getWorkout(wk, dy);
  archiveActive(wo, dy);
  wo.override = { mode: 'free' };
  loadFromArchive(wo, 'free');
  if (!wo.freeBuild) wo.freeBuild = { title: '', notes: '', exercises: [] };
  // free-build doesn't use checks/sets/cardio
  delete wo.checks;
  delete wo.sets;
  delete wo.cardio;
  setWorkout(wk, dy, wo);
  closeCustomize();
  render();
}
function resetOverride(wk, dy) {
  const wo = getWorkout(wk, dy);
  archiveActive(wo, dy);
  delete wo.override;
  delete wo.freeBuild;
  loadFromArchive(wo, String(dy));
  setWorkout(wk, dy, wo);
  render();
}
function updateFreeBuild(wk, dy, field, val) {
  const wo = getWorkout(wk, dy);
  if (!wo.freeBuild) wo.freeBuild = { title: '', notes: '', exercises: [] };
  wo.freeBuild[field] = val;
  setWorkout(wk, dy, wo);
}
function addFreeEx(wk, dy) {
  const wo = getWorkout(wk, dy);
  if (!wo.freeBuild) wo.freeBuild = { title: '', notes: '', exercises: [] };
  if (!wo.freeBuild.exercises) wo.freeBuild.exercises = [];
  wo.freeBuild.exercises.push({ name: '', sets: '', reps: '', weight: '' });
  setWorkout(wk, dy, wo);
  render();
}
function updateFreeEx(wk, dy, idx, field, val) {
  const wo = getWorkout(wk, dy);
  if (!wo.freeBuild || !wo.freeBuild.exercises || !wo.freeBuild.exercises[idx]) return;
  wo.freeBuild.exercises[idx][field] = val;
  setWorkout(wk, dy, wo);
}
function removeFreeEx(wk, dy, idx) {
  const wo = getWorkout(wk, dy);
  if (!wo.freeBuild || !wo.freeBuild.exercises) return;
  wo.freeBuild.exercises.splice(idx, 1);
  setWorkout(wk, dy, wo);
  render();
}
function navWeek(dir) { currentWeek = Math.max(0, Math.min(PROGRAM.weeks - 1, currentWeek + dir)); render(); }
function selectDay(d) { currentDay = d; render(); }
function navToCell(w, d) { currentWeek = w; currentDay = d; activeView = 'workout'; render(); window.scrollTo({ top: 0, behavior: 'smooth' }); }

function toggleExercise(wk, dy, idx) {
  const wo = getWorkout(wk, dy);
  if (!wo.checks) wo.checks = {};
  wo.checks[idx] = !wo.checks[idx];
  if (!wo.checks[idx]) delete wo.checks[idx];
  setWorkout(wk, dy, wo);
  render();
}

function checkAllDone() {
  const day = resolveDay(currentWeek, currentDay);
  const wo = getWorkout(currentWeek, currentDay);
  if (day.rest || day.cardio || (wo.override && wo.override.mode === 'free')) return;
  if (wo.completed) return;
  const total = countExercises(day);
  const done = countChecked(wo);
  if (total > 0 && done === total) {
    const btn = document.getElementById('completeBtn');
    if (btn) {
      btn.classList.add('attention');
      btn.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
  }
}

function toggleComplete(wk, dy) {
  const wo = getWorkout(wk, dy);
  wo.completed = !wo.completed;
  setWorkout(wk, dy, wo);
  render();
}

function updateSet(wk, dy, exIdx, setIdx, field, val) {
  const wo = getWorkout(wk, dy);
  if (!wo.sets) wo.sets = {};
  if (!wo.sets[exIdx]) wo.sets[exIdx] = {};
  if (!wo.sets[exIdx][setIdx]) wo.sets[exIdx][setIdx] = {};
  wo.sets[exIdx][setIdx][field] = val;
  setWorkout(wk, dy, wo);
  maybeAutoComplete(wk, dy);
}

// When every trackable set has both weight and reps filled in,
// automatically mark the workout complete and check all exercises.
function maybeAutoComplete(wk, dy) {
  const day = resolveDay(wk, dy);
  if (day.rest || day.cardio) return;
  const wo = getWorkout(wk, dy);
  if (wo.completed) return;
  if (wo.override && wo.override.mode === 'free') return;
  if (!day.groups) return;

  let idx = 0, allFilled = true, hasTrackable = false;
  outer: for (const g of day.groups) {
    for (const ex of g.exercises) {
      const trackW = ex.trackWeight !== false && ex.sets > 0;
      if (trackW) {
        hasTrackable = true;
        for (let s = 0; s < ex.sets; s++) {
          const sv = (wo.sets && wo.sets[idx] && wo.sets[idx][s]) || {};
          if (!sv.w || !sv.r) { allFilled = false; break outer; }
        }
      }
      idx++;
    }
  }

  if (hasTrackable && allFilled) {
    if (!wo.checks) wo.checks = {};
    let i = 0;
    for (const g of day.groups) {
      for (const ex of g.exercises) { wo.checks[i] = true; i++; }
    }
    wo.completed = true;
    setWorkout(wk, dy, wo);
    if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
    render();
  }
}

function flashSaved(el) {
  if (!el.value) return;
  el.classList.add('saved');
  setTimeout(() => el.classList.remove('saved'), 600);
}

function updateCardio(wk, dy, field, val) {
  const wo = getWorkout(wk, dy);
  if (!wo.cardio) wo.cardio = {};
  wo.cardio[field] = val;
  setWorkout(wk, dy, wo);
}

function updateCardioType(wk, dy, prefKey, val) {
  updateCardio(wk, dy, 'type', val);
  if (!state.cardioPrefs) state.cardioPrefs = {};
  state.cardioPrefs[prefKey] = val;
  saveState();
  render();
}

function logWeight() {
  const input = document.getElementById('weightInput');
  const val = parseFloat(input.value);
  if (!val) return;
  if (!state.weights) state.weights = [];
  const today = new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  state.weights = state.weights.filter(e => e.date !== today);
  state.weights.push({ date: today, value: val });
  saveState();
  render();
}

// ── Timer ──
function startTimer(btn) {
  if (activeTimer) {
    clearInterval(activeTimer.interval);
    if (activeTimer.btn) {
      activeTimer.btn.classList.remove('running');
      activeTimer.btn.innerHTML = '&#9201; Rest 60s';
    }
  }
  let seconds = 60;
  btn.classList.add('running');
  btn.textContent = seconds + 's';
  activeTimer = {
    btn,
    interval: setInterval(() => {
      seconds--;
      btn.textContent = seconds + 's';
      if (seconds <= 0) {
        clearInterval(activeTimer.interval);
        btn.classList.remove('running');
        btn.innerHTML = '&#9201; Rest 60s';
        activeTimer = null;
        if (navigator.vibrate) navigator.vibrate([200, 100, 200, 100, 200]);
      }
    }, 1000)
  };
}

// ── CSV Export ──
function exportCSV() {
  const headers = ['Date','Day','Type','Completed','Exercises Done','Exercise Details','Cardio Type','Duration (min)','Avg HR','Calories','Body Weight'];
  const rows = [headers.join(',')];
  for (let w = 0; w < PROGRAM.weeks; w++) {
    for (let d = 0; d < 7; d++) {
      const day = PROGRAM.days[d];
      const wo = getWorkout(w, d);
      const cellDate = new Date(getWeekStart(w));
      cellDate.setDate(cellDate.getDate() + d);
      const dateStr = cellDate.toISOString().split('T')[0];
      const dateFmt = cellDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
      const bw = (state.weights || []).find(e => e.date === dateFmt);
      if (wo.override && wo.override.mode === 'rest') {
        rows.push([dateStr, day.name, 'Skipped', 'No', '-', '-', '-', '-', '-', '-', bw ? bw.value : ''].join(','));
        continue;
      }
      if (day.rest) {
        rows.push([dateStr, day.name, 'Rest', '-', '-', '-', '-', '-', '-', '-', bw ? bw.value : ''].join(','));
        continue;
      }
      const completed = wo.completed ? 'Yes' : 'No';
      if (day.cardio) {
        const cd = wo.cardio || {};
        rows.push([dateStr, day.name, day.type, completed, '-', '-',
          `"${cd.customType || cd.type || ''}"`, cd.duration || '', cd.hr || '', cd.cals || '', bw ? bw.value : ''].join(','));
      } else if (day.groups) {
        const checks = wo.checks || {};
        const sets = wo.sets || {};
        let exDone = 0, details = [], idx = 0;
        day.groups.forEach(g => {
          g.exercises.forEach(ex => {
            if (checks[idx]) exDone++;
            const sd = sets[idx] || {};
            const setParts = [];
            for (let s = 0; s < (ex.sets || 0); s++) {
              const sv = sd[s] || {};
              if (sv.w || sv.r) setParts.push(`${sv.w || 0}lbs x${sv.r || 0}`);
            }
            if (setParts.length) details.push(`${ex.name}: ${setParts.join('; ')}`);
            idx++;
          });
        });
        rows.push([dateStr, day.name, day.type, completed, exDone, `"${details.join(' | ')}"`, '-', '-', '-', '-', bw ? bw.value : ''].join(','));
      }
    }
  }
  const blob = new Blob([rows.join('\n')], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'jimmy_workout_data.csv';
  a.click();
  URL.revokeObjectURL(url);
}

// ── Init ──
render();

// ── PWA ──
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js');
}
